name: Bug report
description: Something isn't working as expected
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the sections below so we can reproduce and fix it.
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
      placeholder: The board rendered incorrectly after promoting a pawn...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this behavior?
      placeholder: |
        1. Start a game with `...`
        2. Play moves `...`
        3. See error
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      description: Which part of OpenChess is affected?
      options:
        - CLI / TUI (rendering, input, menus)
        - Gameplay / rules (moves, check, endgame detection)
        - Online 1v1 / matchmaking
        - Play vs AI
        - Auth / account
        - Progression (XP, coins, achievements, titles)
        - Leaderboard / stats
        - Premium / billing
        - Server / API
        - Database
        - Other / not sure
    validations:
      required: true
  - type: dropdown
    id: game-mode
    attributes:
      label: Game mode (if applicable)
      options:
        - Local 1v1
        - Play vs AI
        - Online 1v1
        - Not applicable
    validations:
      required: false
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: e.g. Windows 11, macOS 15, Ubuntu 24.04
    validations:
      required: true
  - type: input
    id: terminal
    attributes:
      label: Terminal
      description: The terminal emulator you're using, since this is a TUI app.
      placeholder: e.g. Windows Terminal, iTerm2, Ghostty, kitty
    validations:
      required: false
  - type: input
    id: bun-version
    attributes:
      label: Bun version
      description: Output of `bun --version`.
      placeholder: e.g. 1.3.14
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or output
      description: Paste any error output or screenshots. This will be automatically formatted as code.
      render: shell
    validations:
      required: false
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I have searched existing issues for duplicates
          required: true
